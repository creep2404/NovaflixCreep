name: Frontend CI

on:
  push:
    paths:
      - "novaflix/frontend/**"
  pull_request:
    paths:
      - "novaflix/frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: novaflix/frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: novaflix/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript version
        run: npx tsc -v

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
