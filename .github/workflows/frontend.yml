name: Frontend CI

on:
  push:
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check TypeScript version
        run: npx tsc -v

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      # Optional: nếu có test
      # - name: Run tests
      #   run: npm test
