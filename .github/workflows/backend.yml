name: Backend CI

on:
  push:
    paths:
      - "novaflix/backend/**"
  pull_request:
    paths:
      - "novaflix/backend/**"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: novaflix/backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: novaflix/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit
